name: Build LoopFollow with API Key

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install || bundle update
          bundle exec pod install

      - name: Build and upload with Fastlane + API Key
        env:
          DEVELOPER_APP_ID: ${{ secrets.DEVELOPER_APP_ID }}
          DEVELOPER_APP_ID_NAME: ${{ secrets.DEVELOPER_APP_ID_NAME }}
          DEVELOPER_CERTIFICATE_NAME: ${{ secrets.DEVELOPER_CERTIFICATE_NAME }}
          DEVELOPER_EMAIL: ${{ secrets.DEVELOPER_EMAIL }}
          FASTLANE_API_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_API_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_API_KEY: ${{ secrets.FASTLANE_KEY }}
        run: |
          bundle exec fastlane build_and_upload_with_api
